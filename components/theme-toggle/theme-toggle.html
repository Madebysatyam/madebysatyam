<!--
  Theme toggle — paste before closing </body>.

  Requires:
  - <html data-theme="dark|light"> on document root
  - styles/global.css (imports components.css)
  - components/theme-toggle/theme-toggle.css (via styles/components.css)
  - components/theme-toggle/theme-toggle.js
-->
<button
  type="button"
  class="theme-toggle"
  aria-label="Switch to light theme"
  aria-pressed="false"
  data-theme-state="dark"
>
  <span class="theme-toggle__icon" aria-hidden="true">
    <svg
      class="theme-toggle__svg"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <g class="theme-toggle__sun">
        <circle
          class="theme-toggle__sun-core"
          cx="12"
          cy="12"
          r="3.25"
          stroke="currentColor"
          stroke-width="1.5"
        />
        <g class="theme-toggle__sun-rays">
          <line x1="12" y1="3.5" x2="12" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <line x1="12" y1="18" x2="12" y2="20.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <line x1="3.5" y1="12" x2="6" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <line x1="18" y1="12" x2="20.5" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <line x1="5.8" y1="5.8" x2="7.6" y2="7.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <line x1="16.4" y1="16.4" x2="18.2" y2="18.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <line x1="16.4" y1="7.6" x2="18.2" y2="5.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <line x1="5.8" y1="18.2" x2="7.6" y2="16.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </g>
      </g>
      <path
        class="theme-toggle__moon"
        fill="none"
        d="M14.2 4.2a7.8 7.8 0 1 0 0 15.6 6.4 6.4 0 0 1 0-15.6z"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linejoin="round"
      />
    </svg>
  </span>
</button>
